<!DOCTYPE html>
<html>
<head>
  <title>Download Complete</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: clamp(45px, 13vw, 100px);
      margin-bottom: 35px;
      color: red;
      line-height: 1;
    }

    img {
      width: 95vw;
      max-width: 900px;
      max-height: 65vh;
      object-fit: contain;
      border: 4px solid white;
    }
  </style>
</head>

<body>

  <h1>Download Complete</h1>

  <img id="switchingImage" src="images/hack1.jpg" alt="Alternating image">

  <script>
    const images = [
      "images/hack1.jpg",
      "images/hack2.png"
    ];

    let currentImage = 0;

    setInterval(function() {
      currentImage = currentImage + 1;

      if (currentImage >= images.length) {
        currentImage = 0;
      }

      document.getElementById("switchingImage").src = images[currentImage];
    }, 1000);
  </script>

</body>
</html>
