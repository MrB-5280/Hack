<!DOCTYPE html>
<html>
<head>
  <title>Download Complete</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 30px;
      color : Red;
    }

    img {
      width: 80vw;
      max-width: 500px;
      border: 3px solid white;
    }
  </style>
</head>

<body>

  <h1>Download Complete</h1>

  <img id="switchingImage" src="images/hack1.jpg" alt="Alternating image">

  <script>
    const images = [
      "images/hack1.jpg",
      "images/hack2.png"
    ];

    let currentImage = 0;

    setInterval(function() {
      currentImage = currentImage + 1;

      if (currentImage >= images.length) {
        currentImage = 0;
      }

      document.getElementById("switchingImage").src = images[currentImage];
    }, 1000);
  </script>

</body>
</html>
