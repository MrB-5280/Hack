<!DOCTYPE html>
<html>
<head>
  <title>Loading Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 800px;
    }

    h1 {
      font-size: clamp(36px, 10vw, 85px);
      margin-bottom: 40px;
      line-height: 1.1;
    }

    .loading-bar {
      width: 100%;
      height: clamp(35px, 7vw, 60px);
      border: 3px solid white;
      border-radius: 40px;
      overflow: hidden;
    }

    .loading-fill {
      height: 100%;
      width: 0%;
      background-color: white;
      animation: load 4s forwards;
    }

    @keyframes load {
      from {
        width: 0%;
      }

      to {
        width: 100%;
      }
    }

    p {
      margin-top: 30px;
      font-size: clamp(24px, 6vw, 45px);
    }
  </style>

  <script>
    setTimeout(function() {
      window.location.href = "complete.html";
    }, 4000);
  </script>
</head>

<body>

  <div class="container">
    <h1>Downloading data from current device</h1>

    <div class="loading-bar">
      <div class="loading-fill"></div>
    </div>

    <p>Download in Progress...</p>
  </div>

</body>
</html>
