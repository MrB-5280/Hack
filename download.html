<!DOCTYPE html>
<html>
<head>
  <title>Loading Page</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      width: 80%;
      max-width: 500px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 30px;
    }

    .loading-bar {
      width: 100%;
      height: 30px;
      border: 2px solid white;
      border-radius: 20px;
      overflow: hidden;
    }

    .loading-fill {
      height: 100%;
      width: 0%;
      background-color: white;
      animation: load 4s forwards;
    }

    @keyframes load {
      from {
        width: 0%;
      }

      to {
        width: 100%;
      }
    }

    p {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>

  <script>
    setTimeout(function() {
      window.location.href = "complete.html";
    }, 4000);
  </script>
</head>

<body>

  <div class="container">
    <h1>Downloading data from current device</h1>

    <div class="loading-bar">
      <div class="loading-fill"></div>
    </div>

    <p>Download in Progress...</p>
  </div>

</body>
</html>
